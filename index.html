<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Absensi Pro | SMP Negeri 2 Pringkuku</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f0f4f8; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 1rem; }
        .bg-education {
            background-image: linear-gradient(rgba(30, 64, 175, 0.8), rgba(30, 64, 175, 0.8)), url('https://images.unsplash.com/photo-1523050335392-93851179ae22?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
        }
        .scanner-wrapper { position: relative; overflow: hidden; border-radius: 1rem; background: #000; min-height: 300px; }
        #reader { border: none !important; }
        .scan-laser {
            position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            box-shadow: 0 0 15px #3b82f6; animation: scanMove 2.5s infinite linear; z-index: 10;
        }
        @keyframes scanMove { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
        @media print { .no-print { display: none !important; } body { background: white; } }
    </style>
</head>
<body class="text-gray-800">

    <div id="loginSection" class="min-h-screen flex items-center justify-center bg-education p-4 no-print">
        <div class="glass-card p-8 w-full max-w-md shadow-2xl text-center border border-white/20">
            <img src="https://imgur.com/KGNEukP.png" alt="Logo" class="w-20 h-20 mx-auto mb-4 object-contain">
            <h1 class="text-2xl font-bold text-blue-900 mb-2">E-Absensi Pro</h1>
            <p class="text-xs text-blue-700 font-semibold mb-6 uppercase tracking-wider">SMP Negeri 2 Pringkuku</p>
            
            <form id="loginForm" class="space-y-4">
                <div class="text-left">
                    <label class="text-[10px] font-bold text-gray-500 ml-1 uppercase">Username Admin</label>
                    <input type="text" id="username" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="admin" required>
                </div>
                <div class="text-left">
                    <label class="text-[10px] font-bold text-gray-500 ml-1 uppercase">Password</label>
                    <input type="password" id="password" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••••" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-lg mt-2">MASUK SISTEM</button>
            </form>
            <p class="mt-6 text-[10px] text-gray-500 uppercase italic tracking-widest">P.taqin-belajar</p>
        </div>
    </div>

    <div id="mainDashboard" class="hidden min-h-screen flex flex-col">
        <header class="bg-white shadow-md p-4 sticky top-0 z-50 no-print border-b border-blue-100">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-600 p-2 rounded-lg text-white shadow-md"><i class="fas fa-university"></i></div>
                    <h2 class="font-bold leading-tight">E-Absensi Pro <br><span class="text-[10px] text-gray-400 uppercase font-normal">SMPN 2 Pringkuku</span></h2>
                </div>
                
                <div class="flex items-center space-x-4">
                    <div class="text-right hidden sm:block">
                        <p id="realTimeClock" class="font-bold text-blue-600 text-sm"></p>
                        <p id="currentDate" class="text-[10px] text-gray-500 font-bold uppercase"></p>
                    </div>
                    <button onclick="logout()" class="flex items-center gap-2 bg-red-50 text-red-600 px-3 py-2 rounded-lg font-bold text-xs hover:bg-red-600 hover:text-white transition-all border border-red-100 shadow-sm">
                        <i class="fas fa-sign-out-alt"></i> <span class="hidden md:inline">KELUAR</span>
                    </button>
                </div>
            </div>
        </header>

        <main class="container mx-auto p-4 flex-grow">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 no-print">
                <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-blue-500">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Total Siswa</p>
                    <h3 id="statTotal" class="text-xl font-bold text-blue-900">0</h3>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-green-500">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Hadir Hari Ini</p>
                    <h3 id="statHadir" class="text-xl font-bold text-green-600">0</h3>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-red-500">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Absen Hari Ini</p>
                    <h3 id="statTidakHadir" class="text-xl font-bold text-red-600">0</h3>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-yellow-500">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Persentase</p>
                    <h3 id="statPersen" class="text-xl font-bold text-yellow-600">0%</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8 no-print">
                <div class="lg:col-span-1">
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                        <h3 class="font-bold mb-4 text-xs uppercase text-gray-500 flex items-center">
                            <i class="fas fa-camera mr-2"></i> Kamera Scanner
                        </h3>
                        <div class="scanner-wrapper">
                            <div class="scan-laser"></div>
                            <div id="reader"></div>
                        </div>
                        <div id="scanResult" class="mt-4 hidden p-3 rounded-lg text-center font-bold text-sm"></div>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <div class="bg-white rounded-2xl shadow-sm overflow-hidden min-h-[400px] border border-gray-100">
                        <div class="p-4 border-b bg-gray-50 flex flex-wrap gap-2 justify-between items-center">
                            <h3 class="font-bold text-xs uppercase text-gray-500">Log Kehadiran Hari Ini</h3>
                            <div class="flex gap-2">
                                <button onclick="printMonthlyReport()" class="text-[10px] bg-green-600 text-white px-3 py-1.5 rounded font-bold hover:bg-green-700 shadow-sm transition">
                                    <i class="fas fa-calendar-alt mr-1"></i> REKAP BULANAN
                                </button>
                                <button onclick="printFullReport()" class="text-[10px] bg-blue-600 text-white px-3 py-1.5 rounded font-bold hover:bg-blue-700 shadow-sm transition">
                                    <i class="fas fa-print mr-1"></i> CETAK HARIAN
                                </button>
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead class="bg-gray-50 text-[10px] uppercase text-gray-400 border-b">
                                    <tr><th class="p-4">Jam</th><th class="p-4">Nama</th><th class="p-4">Kelas</th><th class="p-4 text-center">Aksi</th></tr>
                                </thead>
                                <tbody id="attendanceLog" class="divide-y"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="no-print">
                <hr class="mb-8 border-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-gray-700 uppercase text-xs tracking-widest"><i class="fas fa-users mr-2"></i> Monitoring Kelas</h3>
                    <button onclick="resetData()" class="text-[10px] text-red-500 font-bold hover:underline"><i class="fas fa-sync mr-1"></i> Hapus Semua Data</button>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 pb-10" id="rekapKelasContainer"></div>
            </div>
        </main>
    </div>

    <audio id="beepSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

            { id: "1235", nis: "1235", nama: "SURYA ADITYA TAMA", kelas: "8B" },
            { id: "1236", nis: "1236", nama: "ULYF ALVIANTI", kelas: "8B" },
            { id: "1237", nis: "1237", nama: "VICKY PANDU AR ROZZAAQ", kelas: "8B" },
            { id: "1238", nis: "1238", nama: "YOGI EKA OKTAVIAN ANANDA", kelas: "8B" }
        ];

        let attendanceData = JSON.parse(localStorage.getItem('absensi_data')) || [];
        let html5QrCode = null;

        // AUTHENTICATION
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            if(document.getElementById('username').value === 'admin' && document.getElementById('password').value === 'admin123') {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                initApp();
            } else { alert("Username/Password Salah!"); }
        });

        function logout() {
            if(confirm("Keluar sistem?")) location.reload();
        }

        function initApp() {
            updateClock(); 
            setInterval(updateClock, 1000);
            renderStats(); 
            renderLogs(); 
            startScanner();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('realTimeClock').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('currentDate').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                processAttendance(text);
            }).catch(err => console.error(err));
        }

        // ==========================================
        // 2. PROSES ABSENSI & KIRIM KE SHEETS
        // ==========================================
        function processAttendance(id) {
            const s = DATA_MASTER.find(item => item.id === id || item.nis === id);
            const res = document.getElementById('scanResult');
            res.classList.remove('hidden');

            if(!s) {
                res.className = "mt-4 p-3 rounded-lg bg-red-100 text-red-700 font-bold";
                res.innerText = "❌ TIDAK TERDAFTAR";
            } else {
                const today = new Date().toLocaleDateString('id-ID');
                if(attendanceData.find(a => a.nis === s.nis && a.tgl === today)) {
                    res.className = "mt-4 p-3 rounded-lg bg-yellow-100 text-yellow-700 font-bold";
                    res.innerText = "⚠️ SUDAH ABSEN: " + s.nama;
                } else {
                    document.getElementById('beepSound').play();
                    
                    const newEntry = { 
                        nis: s.nis, nama: s.nama, kelas: s.kelas, 
                        tgl: today, waktu: new Date().toLocaleTimeString('id-ID') 
                    };

                    // Simpan Lokal
                    attendanceData.unshift(newEntry);
                    localStorage.setItem('absensi_data', JSON.stringify(attendanceData));
                    
                    // Kirim Online (Google Sheets)
                    if(GOOGLE_SHEET_URL !== 'GANTI_DENGAN_URL_WEB_APP_ANDA_DI_SINI') {
                        fetch(GOOGLE_SHEET_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            cache: 'no-cache',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(newEntry)
                        }).catch(err => console.log("Offline/Error Sheets"));
                    }

                    res.className = "mt-4 p-3 rounded-lg bg-green-100 text-green-700 font-bold";
                    res.innerText = "✅ BERHASIL: " + s.nama;
                    renderStats(); renderLogs();
                }
            }
            setTimeout(() => res.classList.add('hidden'), 2500);
        }

        function renderStats() {
            const today = new Date().toLocaleDateString('id-ID');
            const hadir = attendanceData.filter(a => a.tgl === today).length;
            const total = DATA_MASTER.length;
            document.getElementById('statTotal').innerText = total;
            document.getElementById('statHadir').innerText = hadir;
            document.getElementById('statTidakHadir').innerText = total - hadir;
            document.getElementById('statPersen').innerText = Math.round((hadir/total)*100) + "%";
            
            const kls = ["7A", "7B", "8A", "8B"];
            document.getElementById('rekapKelasContainer').innerHTML = kls.map(k => {
                const tk = DATA_MASTER.filter(s => s.kelas === k).length;
                const hk = attendanceData.filter(a => a.tgl === today && a.kelas === k).length;
                return `
                    <div class="bg-white p-4 rounded-xl border shadow-sm">
                        <div class="flex justify-between text-xs font-bold mb-2"><span>KELAS ${k}</span><span class="text-blue-600">${hk}/${tk}</span></div>
                        <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                            <div class="bg-blue-500 h-full" style="width:${(hk/tk)*100}%"></div>
                        </div>
                        <button onclick="printClassReport('${k}')" class="w-full mt-3 py-1 bg-gray-50 border text-[10px] font-bold rounded hover:bg-blue-600 hover:text-white transition">CETAK DETAIL</button>
                    </div>`;
            }).join('');
        }

        function renderLogs() {
            const today = new Date().toLocaleDateString('id-ID');
            const logs = attendanceData.filter(a => a.tgl === today);
            document.getElementById('attendanceLog').innerHTML = logs.map((a, i) => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="p-4 font-mono text-xs text-blue-600 font-bold">${a.waktu}</td>
                    <td class="p-4 text-xs font-bold">${a.nama}</td>
                    <td class="p-4 text-xs text-gray-500">${a.kelas}</td>
                    <td class="p-4 text-center"><button onclick="deleteRow(${i})" class="text-red-300 hover:text-red-600"><i class="fas fa-trash"></i></button></td>
                </tr>`).join('');
        }

        function deleteRow(i) {
            if(confirm("Hapus?")) { attendanceData.splice(i, 1); localStorage.setItem('absensi_data', JSON.stringify(attendanceData)); renderStats(); renderLogs(); }
        }

        function resetData() {
            if(confirm("HAPUS SEMUA DATABASE? Tindakan ini tidak bisa dibatalkan.")) { 
                attendanceData = []; localStorage.removeItem('absensi_data'); renderStats(); renderLogs(); 
            }
        }

        // --- FUNGSI CETAK ---
        function printFullReport() {
            const today = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const win = window.open('', '_blank');
            win.document.write(`<html><head><style>body{font-family:sans-serif;padding:20px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #000;padding:8px;font-size:12px}</style></head><body>
                <h2 style="text-align:center">LAPORAN KEHADIRAN HARIAN<br>SMPN 2 PRINGKUKU</h2>
                <p>Tanggal: ${today}</p>
                <table><thead><tr><th>No</th><th>Nama</th><th>Kelas</th><th>Status</th><th>Jam</th></tr></thead><tbody>
                ${DATA_MASTER.map((s,i)=>{
                    const a = attendanceData.find(d => d.nis === s.nis && d.tgl === new Date().toLocaleDateString('id-ID'));
                    return `<tr><td>${i+1}</td><td>${s.nama}</td><td>${s.kelas}</td><td>${a?'HADIR':'ALFA'}</td><td>${a?a.waktu:'-'}</td></tr>`;
                }).join('')}
                </tbody></table></body></html>`);
            win.document.close(); win.print();
        }

        function printMonthlyReport() {
            const now = new Date();
            const monthName = now.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
            const currentMonth = now.getMonth() + 1;
            const currentYear = now.getFullYear();

            const win = window.open('', '_blank');
            win.document.write(`<html><head><style>body{font-family:sans-serif;padding:20px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #000;padding:6px;font-size:10px}</style></head><body>
                <h2 style="text-align:center">REKAPITULASI KEHADIRAN BULANAN<br>SMPN 2 PRINGKUKU</h2>
                <p>Periode: ${monthName}</p>
                <table><thead><tr><th>No</th><th>NIS</th><th>Nama</th><th>Kelas</th><th>Total Hadir</th><th>Persentase</th></tr></thead><tbody>
                ${DATA_MASTER.map((s,i)=>{
                    const count = attendanceData.filter(a => {
                        const [d, m, y] = a.tgl.split('/');
                        return a.nis === s.nis && parseInt(m) === currentMonth && parseInt(y) === currentYear;
                    }).length;
                    const days = [...new Set(attendanceData.filter(a => {
                        const [d, m, y] = a.tgl.split('/');
                        return parseInt(m) === currentMonth && parseInt(y) === currentYear;
                    }).map(a => a.tgl))].length || 1;
                    return `<tr><td>${i+1}</td><td>${s.nis}</td><td>${s.nama}</td><td>${s.kelas}</td><td>${count} Hari</td><td>${Math.round((count/days)*100)}%</td></tr>`;
                }).join('')}
                </tbody></table></body></html>`);
            win.document.close(); win.print();
        }

        function printClassReport(kelas) {
            const today = new Date().toLocaleDateString('id-ID');
            const win = window.open('', '_blank');
            const list = DATA_MASTER.filter(s => s.kelas === kelas);
            win.document.write(`<html><head><style>body{font-family:sans-serif;padding:20px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #000;padding:8px}</style></head><body>
                <h2>LAPORAN KELAS ${kelas}</h2><p>Tanggal: ${today}</p>
                <table><thead><tr><th>No</th><th>Nama</th><th>Status</th></tr></thead><tbody>
                ${list.map((s,i)=>{
                    const a = attendanceData.find(d => d.nis === s.nis && d.tgl === today);
                    return `<tr><td>${i+1}</td><td>${s.nama}</td><td>${a?'HADIR ('+a.waktu+')':'ALFA'}</td></tr>`;
                }).join('')}
                </tbody></table></body></html>`);
            win.document.close(); win.print();
        }
    </script>
</body>
</html>
